<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIF – Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #D93B1A;
      --text: #F5F5F7;
      --muted: #AEAEB2;
      --bg: #111113;
      --border: #2C2C2E;
    }
    html, body {
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px 120px;
      text-align: center;
    }

    /* Subtle radial glow behind logo */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 500px;
      background: radial-gradient(ellipse at top, rgba(217,59,26,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 56px;
    }
    .logo img {
      height: clamp(40px, 9vw, 76px);
      width: auto;
    }
    .logo-name {
      font-size: clamp(52px, 12vw, 100px);
      font-weight: 800;
      letter-spacing: -3px;
      color: var(--text);
    }

    /* Coming Soon label */
    .label {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 20px;
    }

    /* Main heading */
    h1 {
      font-size: clamp(52px, 12vw, 100px);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      color: var(--text);
      margin-bottom: 28px;
    }
    h1 span { color: var(--blue); }

    /* Tagline */
    p {
      font-size: clamp(17px, 2.5vw, 20px);
      color: var(--muted);
      line-height: 1.6;
      max-width: 480px;
      margin-bottom: 64px;
    }

    /* Launch note */
    .launch-note {
      font-size: clamp(15px, 2vw, 18px);
      color: var(--blue);
      font-weight: 600;
      letter-spacing: 0.2px;
      margin-bottom: 0;
    }

    /* Red footer bar */
    .red-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #2C2C2E;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      z-index: 10;
    }
    .red-footer span {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1px;
    }
    .red-footer a {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .red-footer a:hover { opacity: 0.8; }

    @media (max-width: 480px) {
      .red-footer { justify-content: center; text-align: center; }
    }

    @media (max-width: 480px) {
      h1 { letter-spacing: -2px; }
      p { margin-bottom: 48px; }
    }
  </style>
</head>
<body>

  <div class="wrap">

    <div class="logo">
      <img src="logo.png" alt="VIF logo">
      <span class="logo-name">VIF</span>
    </div>

    <div class="label">Coming Soon</div>

    <h1>Punchlists,<br>done <span>right.</span></h1>

    <p>
      Snap. Analyze. Report.<br>VIF AI turns photos into punchlists and PDFs.
    </p>

    <p class="launch-note">Launching on the Apple App Store</p>

  </div>

  <div class="red-footer">
    <span>Steeltree Labs LLC</span>
    <a href="mailto:hello@steeltreelabs.com">Contact us</a>
  </div>

</body>
</html>
